<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0c0c14">
    <title>Maaltafels L2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <button id="reset-btn" class="reset-btn" title="Opnieuw beginnen" disabled>&#8634;</button>
            <h1>Maaltafels L2</h1>
        </header>

        <div id="optiesinfo">
            <div class="info-row">
                <div id="info-tafels"><span>-</span></div>
                <div id="info-ops"><span>-</span></div>
            </div>
            <div class="info-row">
                <div id="info-kaarten"><strong>Kaartjes:</strong> <span>-</span></div>
                <div id="info-mode"><strong>Mode:</strong> <span>Kind</span></div>
            </div>
        </div>

        <!-- Stap 1: Kies tafels -->
        <div id="step1" class="step active">
            <h2>Welke tafels wil je oefenen?</h2>
            <div id="tafel-buttons" class="button-grid"></div>
            <button id="select-all" class="action-btn secondary">Alles selecteren</button>
            <div class="step-nav">
                <button id="next1" class="action-btn primary" disabled>Volgende</button>
            </div>
        </div>

        <!-- Stap 2: Kies bewerkingen -->
        <div id="step2" class="step">
            <h2>Welke bewerkingen?</h2>
            <div id="ops-buttons" class="ops-grid">
                <button class="toggle-btn op-btn" data-op="multiplication">X (keer)</button>
                <button class="toggle-btn op-btn" data-op="division">: (delen)</button>
            </div>
            <button id="select-all-ops" class="action-btn secondary">Alles selecteren</button>
            <div class="step-nav">
                <button id="back2" class="action-btn secondary">Terug</button>
                <button id="next2" class="action-btn primary" disabled>Volgende</button>
            </div>
        </div>

        <!-- Stap 3: Hoeveel kaartjes? -->
        <div id="step3" class="step">
            <h2>Hoe wil je oefenen?</h2>
            <div id="mode-buttons" class="mode-grid">
                <button class="toggle-btn mode-btn active" data-mode="kind">
                    Kind
                    <span class="mode-desc">Kies uit 4 antwoorden</span>
                </button>
                <button class="toggle-btn mode-btn" data-mode="ouder">
                    Ouder
                    <span class="mode-desc">Zelf juist of fout aanduiden</span>
                </button>
            </div>
            <h2>Hoeveel kaartjes?</h2>
            <p id="beschikbaar-info"></p>
            <div id="count-buttons" class="count-grid"></div>
            <div class="step-nav">
                <button id="back3" class="action-btn secondary">Terug</button>
                <button id="start-btn" class="action-btn primary" disabled>Klaar om te oefenen!</button>
            </div>
        </div>

        <!-- Oefenscherm -->
        <div id="practice" class="step">
            <div id="deck-info"></div>
            <div id="card-area"></div>
            <button id="begin-btn" class="action-btn primary" style="display:none;">Beginnen!</button>
        </div>

        <!-- Actief oefenen -->
        <div id="exercise" class="step">
            <div id="exercise-progress"></div>
            <div id="active-card"></div>
            <div id="exercise-buttons">
                <div class="exercise-col">
                    <button id="btn-fout" class="exercise-btn fout">Fout</button>
                    <div id="pile-fout" class="pile"></div>
                </div>
                <div class="exercise-col">
                    <button id="btn-juist" class="exercise-btn juist">Juist</button>
                    <div id="pile-juist" class="pile"></div>
                </div>
            </div>
            <button id="btn-spieken" class="action-btn secondary spieken-btn">Spieken</button>
        </div>
    </div>
